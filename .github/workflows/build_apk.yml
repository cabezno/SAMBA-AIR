name: Build SAMBA AIR APK

on:
  push:
    branches: [ main, master, '*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK Release
        run: |
          flutter build apk --release > build_log.txt 2>&1
        continue-on-error: true

      - name: Push Log on Failure
        run: |
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git checkout -B build-log
            git add build_log.txt
            git commit -m "chore: upload build failure log"
            git push -f origin build-log
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samba-air-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
